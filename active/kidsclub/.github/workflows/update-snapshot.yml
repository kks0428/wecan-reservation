name: Update Kidsclub Snapshot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: kidsclub-snapshot-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update snapshot
        env:
          WECAN_USER_ID: ${{ secrets.WECAN_USER_ID }}
          WECAN_USER_PW: ${{ secrets.WECAN_USER_PW }}
          WECAN_WATCH_NAMES: ${{ secrets.WECAN_WATCH_NAMES }}
          WECAN_CHILD_NAME: ${{ secrets.WECAN_CHILD_NAME }}
          WECAN_SNAPSHOT_PATH: data/kidsclub_latest_snapshot.json
        run: python update_snapshot.py

      - name: Commit & push if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/kidsclub_latest_snapshot.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update kidsclub snapshot"

          for i in 1 2; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "push success on attempt $i"
              exit 0
            fi
            echo "push failed on attempt $i, retrying..."
            sleep 2
          done

          echo "failed to push after retries"
          exit 1
